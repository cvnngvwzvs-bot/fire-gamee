<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>予防救急クイズ | 東大阪市消防局</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #10243b;
      --muted: #536171;
      --paper: #ffffff;
      --soft: #f5f8fb;
      --line: #d7e0ea;
      --red: #dc2537;
      --red-deep: #a91425;
      --blue: #075ea8;
      --blue-deep: #033c70;
      --yellow: #ffd23f;
      --green: #12805c;
      --wrong: #b42635;
      --shadow: 0 22px 60px rgba(5, 25, 48, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Meiryo", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(255, 210, 63, 0.95) 0 7%, transparent 7% 14%),
        linear-gradient(135deg, rgba(220, 37, 55, 0.94) 0 12%, transparent 12% 24%),
        linear-gradient(90deg, rgba(7, 94, 168, 0.94), rgba(3, 60, 112, 0.96));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.12) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.09) 1px, transparent 1px),
        repeating-linear-gradient(135deg, rgba(255,255,255,0.08) 0 12px, transparent 12px 24px);
      background-size: 34px 34px, 34px 34px, auto;
      mix-blend-mode: screen;
    }

    .app {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 28px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 16px;
      align-items: center;
      color: #fff;
      margin-bottom: 18px;
    }

    .dept {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 1.05rem;
      min-width: 0;
    }

    .badge119 {
      display: inline-grid;
      place-items: center;
      width: 54px;
      height: 54px;
      border: 3px solid #fff;
      border-radius: 8px;
      background: var(--red);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
      font-size: 1.2rem;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      color: #fff;
      text-align: center;
      font-size: 2.4rem;
      line-height: 1.12;
      text-shadow: 0 3px 16px rgba(0,0,0,0.28);
    }

    .counter {
      justify-self: end;
      min-width: 172px;
      padding: 9px 12px;
      border: 2px solid rgba(255,255,255,0.78);
      border-radius: 8px;
      background: rgba(3, 42, 76, 0.62);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.16);
      text-align: right;
    }

    .counter-label {
      display: block;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.84);
    }

    .counter strong {
      display: block;
      font-size: 1.6rem;
      line-height: 1;
    }

    .shell {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 660px;
      border: 3px solid rgba(255,255,255,0.86);
      border-radius: 8px;
      overflow: hidden;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .mascot-side {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      padding: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(231, 242, 253, 0.96)),
        repeating-linear-gradient(135deg, rgba(220, 37, 55, 0.11) 0 14px, transparent 14px 28px);
      border-right: 1px solid var(--line);
    }

    .mascot-card {
      display: grid;
      place-items: center;
      min-height: 230px;
    }

    .mascot-card img {
      width: min(156px, 90%);
      height: auto;
      image-rendering: auto;
      border-radius: 8px;
      filter: drop-shadow(0 16px 20px rgba(6, 37, 68, 0.20));
    }

    .side-stats {
      display: grid;
      gap: 10px;
    }

    .stat {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.82);
    }

    .stat span {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .stat strong {
      display: block;
      margin-top: 3px;
      font-size: 1.18rem;
    }

    .main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-width: 0;
      background:
        linear-gradient(180deg, #fff 0, #fff 64%, #f1f6fb 100%);
    }

    .status-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      background: #f7fbff;
    }

    .progress-wrap {
      min-width: 0;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .progress {
      height: 12px;
      border-radius: 8px;
      background: #dbe6f1;
      overflow: hidden;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--red), var(--yellow));
      transition: width 240ms ease;
    }

    .score-pill {
      min-width: 112px;
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--blue-deep);
      color: #fff;
      text-align: center;
      font-weight: 800;
    }

    .screen {
      display: none;
      min-height: 0;
    }

    .screen.active {
      display: grid;
    }

    .start-screen {
      align-content: center;
      gap: 24px;
      padding: 32px;
    }

    .start-copy {
      display: grid;
      gap: 12px;
      max-width: 760px;
    }

    .kicker {
      color: var(--red-deep);
      font-weight: 900;
      font-size: 1.05rem;
    }

    .start-copy h2 {
      margin: 0;
      font-size: 2.05rem;
      line-height: 1.25;
    }

    .start-copy p {
      margin: 0;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.7;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      max-width: 720px;
    }

    button {
      font: inherit;
    }

    .mode-btn,
    .action-btn,
    .answer-btn {
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .mode-btn {
      min-height: 106px;
      padding: 18px;
      background: var(--blue);
      color: #fff;
      box-shadow: 0 12px 26px rgba(7, 94, 168, 0.24);
      text-align: left;
    }

    .mode-btn:first-child {
      background: var(--red);
      box-shadow: 0 12px 26px rgba(220, 37, 55, 0.24);
    }

    .mode-btn:hover,
    .action-btn:hover,
    .answer-btn:not(:disabled):hover {
      transform: translateY(-2px);
    }

    .mode-btn strong {
      display: block;
      font-size: 1.42rem;
      margin-bottom: 8px;
    }

    .mode-btn span {
      display: block;
      color: rgba(255,255,255,0.9);
      font-weight: 700;
      line-height: 1.5;
    }

    .tools-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .small-btn {
      min-height: 40px;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      cursor: pointer;
      font-weight: 800;
    }

    .quiz-screen {
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      padding: 26px 28px 28px;
    }

    .question-head {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .category {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 6px 10px;
      border-radius: 8px;
      background: #eaf3fd;
      color: var(--blue-deep);
      font-weight: 900;
    }

    .question-no {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 6px 10px;
      border-radius: 8px;
      background: #fff4c7;
      color: #694e00;
      font-weight: 900;
    }

    .question-text {
      margin: 0;
      font-size: 1.78rem;
      line-height: 1.38;
      min-height: 4.9em;
      display: flex;
      align-items: center;
    }

    .answer-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      align-content: start;
    }

    .answer-btn {
      position: relative;
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      align-items: center;
      min-height: 86px;
      padding: 14px;
      border: 2px solid var(--line);
      background: #fff;
      color: var(--ink);
      text-align: left;
      box-shadow: 0 8px 18px rgba(7, 39, 71, 0.08);
    }

    .answer-btn:disabled {
      cursor: default;
    }

    .answer-key {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: #e8eef5;
      color: var(--blue-deep);
      font-weight: 900;
      font-size: 1.15rem;
    }

    .answer-text {
      font-weight: 800;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .answer-btn.correct {
      border-color: var(--green);
      background: #edf9f4;
    }

    .answer-btn.correct .answer-key {
      background: var(--green);
      color: #fff;
    }

    .answer-btn.wrong {
      border-color: var(--wrong);
      background: #fff0f2;
    }

    .answer-btn.wrong .answer-key {
      background: var(--wrong);
      color: #fff;
    }

    .answer-btn.dim {
      opacity: 0.68;
    }

    .result-band {
      display: none;
      grid-template-columns: 132px 1fr auto;
      gap: 18px;
      align-items: center;
      min-height: 142px;
      padding: 16px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #f8fbff;
    }

    .result-band.show {
      display: grid;
    }

    .illustration {
      width: 132px;
      height: 108px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid #d9e5f0;
      overflow: hidden;
    }

    .illustration svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .feedback {
      min-width: 0;
    }

    .feedback h3 {
      margin: 0 0 6px;
      font-size: 1.32rem;
    }

    .feedback p {
      margin: 0;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.6;
    }

    .action-btn {
      min-width: 128px;
      min-height: 48px;
      padding: 12px 18px;
      background: var(--red);
      color: #fff;
      font-weight: 900;
      box-shadow: 0 10px 22px rgba(220, 37, 55, 0.22);
    }

    .finish-screen {
      align-content: center;
      justify-items: center;
      gap: 20px;
      padding: 34px;
      text-align: center;
    }

    .finish-mark {
      display: grid;
      place-items: center;
      width: 142px;
      height: 142px;
      border-radius: 8px;
      background: #fff4c7;
      border: 3px solid var(--yellow);
    }

    .finish-mark svg {
      width: 112px;
      height: 112px;
    }

    .finish-screen h2 {
      margin: 0;
      font-size: 2.2rem;
    }

    .finish-screen p {
      margin: 0;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.7;
      max-width: 680px;
    }

    .result-score {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .result-score span {
      padding: 10px 13px;
      border-radius: 8px;
      background: #eaf3fd;
      color: var(--blue-deep);
      font-weight: 900;
    }

    .footer-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 900px) {
      .app {
        width: min(100% - 22px, 720px);
        padding-top: 14px;
      }

      .topbar {
        grid-template-columns: 1fr auto;
      }

      h1 {
        grid-column: 1 / -1;
        grid-row: 2;
        text-align: left;
        font-size: 2rem;
      }

      .shell {
        grid-template-columns: 1fr;
      }

      .mascot-side {
        display: grid;
        grid-template-columns: 128px 1fr;
        align-items: center;
        padding: 14px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .mascot-card {
        min-height: auto;
      }

      .mascot-card img {
        width: 96px;
      }

      .side-stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .question-text {
        font-size: 1.45rem;
      }

      .result-band {
        grid-template-columns: 108px 1fr;
      }

      .result-band .action-btn {
        grid-column: 1 / -1;
        justify-self: stretch;
      }

      .illustration {
        width: 108px;
        height: 94px;
      }
    }

    @media (max-width: 620px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .counter {
        justify-self: stretch;
        text-align: left;
      }

      .dept {
        font-size: 0.98rem;
      }

      h1 {
        font-size: 1.72rem;
      }

      .status-row {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .score-pill {
        justify-self: stretch;
      }

      .start-screen,
      .quiz-screen,
      .finish-screen {
        padding: 18px;
      }

      .mode-grid,
      .answer-grid {
        grid-template-columns: 1fr;
      }

      .start-copy h2,
      .finish-screen h2 {
        font-size: 1.55rem;
      }

      .question-text {
        font-size: 1.22rem;
        min-height: auto;
      }

      .answer-btn {
        min-height: 78px;
      }

      .mascot-side {
        grid-template-columns: 94px 1fr;
      }

      .side-stats {
        grid-template-columns: 1fr;
      }

      .result-band {
        grid-template-columns: 1fr;
      }

      .illustration {
        width: 100%;
        height: 116px;
      }
    }
  </style>
</head>

  <script>
    (() => {
      const STORAGE_KEY = "higashiosaka_preventive_emergency_participants";
      const questions = Array.isArray(window.QUIZ_QUESTIONS) ? window.QUIZ_QUESTIONS : [];
      const el = {
        participantCount: document.getElementById("participantCount"),
        sideTotal: document.getElementById("sideTotal"),
        sideScore: document.getElementById("sideScore"),
        progressText: document.getElementById("progressText"),
        modeText: document.getElementById("modeText"),
        progressBar: document.getElementById("progressBar"),
        scorePill: document.getElementById("scorePill"),
        startScreen: document.getElementById("startScreen"),
        quizScreen: document.getElementById("quizScreen"),
        finishScreen: document.getElementById("finishScreen"),
        categoryLabel: document.getElementById("categoryLabel"),
        questionNumber: document.getElementById("questionNumber"),
        questionText: document.getElementById("questionText"),
        answerGrid: document.getElementById("answerGrid"),
        resultBand: document.getElementById("resultBand"),
        illustration: document.getElementById("illustration"),
        feedbackTitle: document.getElementById("feedbackTitle"),
        feedbackText: document.getElementById("feedbackText"),
        nextButton: document.getElementById("nextButton"),
        finishTitle: document.getElementById("finishTitle"),
        finishScore: document.getElementById("finishScore"),
        finishRate: document.getElementById("finishRate"),
        finishRank: document.getElementById("finishRank"),
        finishMessage: document.getElementById("finishMessage"),
        retrySame: document.getElementById("retrySame"),
        backHome: document.getElementById("backHome"),
        resetParticipants: document.getElementById("resetParticipants")
      };

      let deck = [];
      let index = 0;
      let score = 0;
      let currentMode = "all";
      let answered = false;

      const tips = {
        "予防救急の基本": "日ごろから危険を減らすことが、自分や家族の命を守る行動につながります。",
        "熱中症": "水分、室温、休憩を早めに確認して、しんどくなる前に予防しましょう。",
        "ヒートショック": "温度差を小さくし、入浴前後の水分と声かけで事故を防ぎましょう。",
        "窒息・誤嚥": "小さく切る、姿勢を整える、口に入る物を片付けることが大切です。",
        "転倒・転落": "明るさ、段差、敷物、コード、浴室のすべりを見直しましょう。",
        "心筋梗塞・脳卒中": "突然の胸痛、冷や汗、ろれつ、片側の麻痺は早めの119番を考えます。",
        "119番通報・相談": "迷った時の相談先を知り、通報では場所・状況・傷病者の状態を伝えます。",
        "まとめ": "予防、早めの気づき、必要な相談や通報が重症化を防ぎます。"
      };

      function readCount() {
        try {
          return Math.max(0, Number(localStorage.getItem(STORAGE_KEY)) || 0);
        } catch (error) {
          return 0;
        }
      }

      function writeCount(value) {
        try {
          localStorage.setItem(STORAGE_KEY, String(value));
        } catch (error) {
          // localStorageが使えない環境では画面上だけ更新します。
        }
        el.participantCount.textContent = String(value);
      }

      function incrementParticipants() {
        const next = readCount() + 1;
        writeCount(next);
      }

      function showScreen(screen) {
        [el.startScreen, el.quizScreen, el.finishScreen].forEach((node) => {
          node.classList.toggle("active", node === screen);
        });
      }

      function shuffle(items) {
        const copy = items.slice();
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function startGame(mode) {
        currentMode = mode;
        index = 0;
        score = 0;
        deck = mode === "short" ? shuffle(questions).slice(0, 10) : questions.slice();
        incrementParticipants();
        el.sideTotal.textContent = `${deck.length}問`;
        el.sideScore.textContent = "0問";
        el.modeText.textContent = mode === "short" ? "10問チャレンジ" : "全50問";
        showScreen(el.quizScreen);
        renderQuestion();
      }

      function currentQuestion() {
        return deck[index];
      }

      function renderQuestion() {
        const q = currentQuestion();
        answered = false;
        el.categoryLabel.textContent = q.category;
        el.questionNumber.textContent = `第${index + 1}問`;
        el.questionText.textContent = q.question;
        el.resultBand.classList.remove("show");
        el.answerGrid.innerHTML = "";
        q.options.forEach((option) => {
          const button = document.createElement("button");
          button.className = "answer-btn";
          button.type = "button";
          button.dataset.key = option.key;
          button.innerHTML = `<span class="answer-key">${option.key}</span><span class="answer-text"></span>`;
          button.querySelector(".answer-text").textContent = option.text;
          button.addEventListener("click", () => chooseAnswer(option.key));
          el.answerGrid.appendChild(button);
        });
        updateStatus();
      }

      function chooseAnswer(key) {
        if (answered) return;
        answered = true;
        const q = currentQuestion();
        const isCorrect = key === q.answer;
        if (isCorrect) score += 1;

        [...el.answerGrid.children].forEach((button) => {
          const buttonKey = button.dataset.key;
          button.disabled = true;
          if (buttonKey === q.answer) button.classList.add("correct");
          if (buttonKey === key && !isCorrect) button.classList.add("wrong");
          if (buttonKey !== q.answer && buttonKey !== key) button.classList.add("dim");
        });

        const correct = q.options.find((option) => option.key === q.answer);
        el.feedbackTitle.textContent = isCorrect ? "正解です" : "もう一歩です";
        el.feedbackText.textContent = `正解は「${correct.key}. ${correct.text}」。${tips[q.category] || tips["まとめ"]}`;
        el.illustration.innerHTML = illustrationFor(q.category);
        el.nextButton.textContent = index + 1 >= deck.length ? "結果へ" : "次へ";
        el.resultBand.classList.add("show");
        updateStatus();
      }

      function updateStatus() {
        const total = deck.length || 0;
        const done = total ? Math.min(index + (answered ? 1 : 0), total) : 0;
        const percent = total ? Math.round((done / total) * 100) : 0;
        el.progressText.textContent = total ? `${done} / ${total}問` : "スタート待ち";
        el.progressBar.style.width = `${percent}%`;
        el.scorePill.textContent = `${score} / ${total}`;
        el.sideScore.textContent = `${score}問`;
      }

      function next() {
        if (!answered) return;
        if (index + 1 >= deck.length) {
          finishGame();
          return;
        }
        index += 1;
        renderQuestion();
      }

      function finishGame() {
        const total = deck.length;
        const rate = total ? Math.round((score / total) * 100) : 0;
        let rank = "予防救急チェック";
        let message = "大切なのは、迷った時に一人で抱え込まず、早めに相談や119番通報を考えることです。";
        if (rate >= 90) {
          rank = "予防救急マスター";
          message = "日ごろの予防と早めの気づきがしっかり身についています。講習の声かけ役にもぴったりです。";
        } else if (rate >= 70) {
          rank = "安全チェック上手";
          message = "大切なポイントをよく押さえています。家の中の危険な場所も一緒に見直してみましょう。";
        } else if (rate >= 50) {
          rank = "もう少しで安心";
          message = "熱中症、入浴、転倒、窒息の予防をもう一度確認すると、日常で使える力になります。";
        }
        el.finishTitle.textContent = "チャレンジ終了";
        el.finishScore.textContent = `${score} / ${total}`;
        el.finishRate.textContent = `${rate}%`;
        el.finishRank.textContent = rank;
        el.finishMessage.textContent = message;
        updateStatus();
        showScreen(el.finishScreen);
      }

      function home() {
        deck = [];
        index = 0;
        score = 0;
        answered = false;
        el.sideTotal.textContent = "50問";
        el.sideScore.textContent = "0問";
        el.progressText.textContent = "スタート待ち";
        el.modeText.textContent = "全50問";
        el.progressBar.style.width = "0%";
        el.scorePill.textContent = "0 / 0";
        showScreen(el.startScreen);
      }

      function illustrationFor(category) {
        if (category === "熱中症") {
          return svg(`
            <rect width="132" height="108" fill="#fff6cf"/>
            <circle cx="103" cy="25" r="16" fill="#ffd23f" stroke="#d39400" stroke-width="4"/>
            <path d="M25 28 h24 a8 8 0 0 1 8 8 v46 a8 8 0 0 1 -8 8 h-24 a8 8 0 0 1 -8 -8 v-46 a8 8 0 0 1 8 -8z" fill="#bfe8ff" stroke="#075ea8" stroke-width="4"/>
            <path d="M25 24 h24 v-9 h-24z" fill="#075ea8"/>
            <path d="M24 58 h28" stroke="#075ea8" stroke-width="5"/>
            <path d="M78 63 c10 -8 23 -8 33 0" fill="none" stroke="#dc2537" stroke-width="6" stroke-linecap="round"/>
          `);
        }
        if (category === "ヒートショック") {
          return svg(`
            <rect width="132" height="108" fill="#eef7ff"/>
            <rect x="18" y="54" width="78" height="30" rx="8" fill="#ffffff" stroke="#075ea8" stroke-width="4"/>
            <path d="M25 55 v-16 a12 12 0 0 1 24 0" fill="none" stroke="#075ea8" stroke-width="5" stroke-linecap="round"/>
            <circle cx="103" cy="33" r="15" fill="#dc2537"/>
            <rect x="99" y="18" width="8" height="48" rx="4" fill="#dc2537"/>
            <path d="M32 90 h56" stroke="#8cc9ef" stroke-width="7" stroke-linecap="round"/>
            <path d="M64 26 c0 -10 10 -10 10 -20" fill="none" stroke="#dc2537" stroke-width="4" stroke-linecap="round"/>
            <path d="M78 34 c0 -8 8 -8 8 -16" fill="none" stroke="#dc2537" stroke-width="4" stroke-linecap="round"/>
          `);
        }
        if (category === "窒息・誤嚥") {
          return svg(`
            <rect width="132" height="108" fill="#fff4f5"/>

          `);
        }
        if (category === "転倒・転落") {
          return svg(`
            <rect width="132" height="108" fill="#f2fbf6"/>
            <path d="M20 82 h82 v13 h-82z M38 64 h82 v13 h-82z M56 46 h56 v13 h-56z" fill="#d9e5f0" stroke="#075ea8" stroke-width="3"/>
            <circle cx="35" cy="28" r="11" fill="#ffd9b2" stroke="#8b4b22" stroke-width="3"/>
            <path d="M44 43 l23 11 15 -10" fill="none" stroke="#dc2537" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M62 55 l-13 20 M67 56 l6 22" fill="none" stroke="#10243b" stroke-width="6" stroke-linecap="round"/>
            <path d="M101 22 l8 8 m0 -8 l-8 8" stroke="#ffd23f" stroke-width="5" stroke-linecap="round"/>
          `);
        }
        if (category === "心筋梗塞・脳卒中") {
          return svg(`
            <rect width="132" height="108" fill="#f4f8ff"/>
            <path d="M38 36 c0 -12 16 -18 27 -6 11 -12 27 -6 27 6 0 19 -27 36 -27 36s-27 -17 -27 -36z" fill="#dc2537"/>
            <path d="M20 54 h24 l7 -15 12 36 8 -20 h18 l6 -11 8 20 h10" fill="none" stroke="#075ea8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="83" y="19" width="30" height="22" rx="4" fill="#ffffff" stroke="#075ea8" stroke-width="4"/>
            <path d="M91 30 h14 M98 23 v14" stroke="#dc2537" stroke-width="4" stroke-linecap="round"/>
          `);
        }
        if (category === "119番通報・相談") {
          return svg(`
            <rect width="132" height="108" fill="#eef7ff"/>
            <rect x="31" y="16" width="48" height="76" rx="8" fill="#ffffff" stroke="#075ea8" stroke-width="5"/>
            <path d="M42 28 h26" stroke="#d9e5f0" stroke-width="4" stroke-linecap="round"/>
            <path d="M43 50 h24 M43 62 h24" stroke="#dc2537" stroke-width="5" stroke-linecap="round"/>
            <circle cx="55" cy="80" r="4" fill="#075ea8"/>
            <path d="M88 38 c10 6 14 15 13 26 M99 28 c15 10 21 25 20 43" fill="none" stroke="#ffd23f" stroke-width="5" stroke-linecap="round"/>
          `);
        }
        if (category === "まとめ") {
          return svg(`
            <rect width="132" height="108" fill="#fff8df"/>
            <path d="M22 54 l44 -34 44 34 v39 h-88z" fill="#ffffff" stroke="#075ea8" stroke-width="5" stroke-linejoin="round"/>
            <path d="M52 92 v-28 h28 v28" fill="#eaf3fd" stroke="#075ea8" stroke-width="4"/>
            <path d="M66 39 v24 M54 51 h24" stroke="#dc2537" stroke-width="7" stroke-linecap="round"/>
            <path d="M20 86 h92" stroke="#12805c" stroke-width="5" stroke-linecap="round"/>
          `);
        }
        return svg(`
          <rect width="132" height="108" fill="#f4f8ff"/>
          <path d="M66 18 l39 14 v25 c0 25 -17 39 -39 48 -22 -9 -39 -23 -39 -48 v-25z" fill="#ffffff" stroke="#075ea8" stroke-width="5" stroke-linejoin="round"/>
          <path d="M66 42 v29 M52 56 h28" stroke="#dc2537" stroke-width="8" stroke-linecap="round"/>
          <path d="M34 81 c11 9 22 14 32 18 10 -4 21 -9 32 -18" fill="none" stroke="#12805c" stroke-width="5" stroke-linecap="round"/>
        `);
      }

      function svg(content) {
        return `<svg viewBox="0 0 132 108" aria-hidden="true" focusable="false">${content}</svg>`;
      }

      document.querySelectorAll(".mode-btn").forEach((button) => {
        button.addEventListener("click", () => startGame(button.dataset.mode));
      });
      el.nextButton.addEventListener("click", next);
      el.retrySame.addEventListener("click", () => startGame(currentMode));
      el.backHome.addEventListener("click", home);
      el.resetParticipants.addEventListener("click", () => {
        if (window.confirm("累計参加人数を0人に戻しますか。")) writeCount(0);
      });

      writeCount(readCount());
      el.sideTotal.textContent = `${questions.length || 50}問`;
    })();
  </script>
