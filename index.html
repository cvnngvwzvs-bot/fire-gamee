<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>消防隊シミュレーター</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:#070707;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;overflow:hidden}
#app{max-width:460px;height:100vh;margin:0 auto;background:#111;position:relative}
header{height:95px;padding:10px 14px;background:linear-gradient(135deg,#7b0000,#e53935);display:flex;justify-content:space-between;align-items:center}
h1{font-size:22px;margin:0}
#mission{font-size:13px;margin-top:5px;line-height:1.35}
#emoji{font-size:44px}
canvas{display:block;width:100%;height:calc(100vh - 210px);background:#85d9ff;touch-action:none}
#hud{height:50px;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:6px;background:#181818;font-size:12px}
#hud div{background:#2a2a2a;border-radius:8px;display:flex;align-items:center;justify-content:center}
#controls{height:65px;background:#101010;display:flex;justify-content:center;align-items:center;gap:12px}
button{width:92px;height:50px;border:0;border-radius:15px;font-size:20px;font-weight:700;background:#f2f2f2;color:#111;box-shadow:inset 0 -3px 0 rgba(0,0,0,.22)}
#action{background:#4fc3f7}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;padding:20px}
.panel{background:#fff;color:#111;border-radius:22px;padding:22px;text-align:center;width:100%}
.panel h2{margin:0 0 12px;font-size:26px}
.panel p{font-size:15px;line-height:1.55}
.panel button{background:#e53935;color:white;width:100%;margin-top:12px}
</style>
</head>
<body>
<div id="app">
<header>
<div>
<h1>消防隊シミュレーター</h1>
<div id="mission">119番通報：住宅火災発生。現場へ急行せよ。</div>
</div>
<div id="emoji">🚒</div>
</header>

<canvas id="game"></canvas>

<div id="hud">
<div>任務:<span id="phase">出動</span></div>
<div>点数:<span id="score">0</span></div>
<div>体力:<span id="life">3</span></div>
<div>残火:<span id="fireCount">0</span></div>
</div>

<div id="controls">
<button id="left">◀</button>
<button id="action">放水</button>
<button id="right">▶</button>
</div>

<div id="overlay">
<div class="panel">
<h2>🚨 出動指令</h2>
<p>住宅火災が発生。消防車で現場へ急行し、火災を消火して要救助者を救出してください。</p>
<button id="start">出動する</button>
</div>
</div>
</div>

<script>
const canvas=document.getElementById("game"),ctx=canvas.getContext("2d");
const phaseEl=document.getElementById("phase"),scoreEl=document.getElementById("score"),lifeEl=document.getElementById("life"),fireCountEl=document.getElementById("fireCount"),mission=document.getElementById("mission"),overlay=document.getElementById("overlay");
let W,H,running=false,phase="drive",score=0,life=3,distance=0,tick=0;
let truck={x:150,y:0,w:62,h:46},cars=[],fires=[],waters=[],victims=[];

function resize(){let r=canvas.getBoundingClientRect();canvas.width=r.width*devicePixelRatio;canvas.height=r.height*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);W=r.width;H=r.height;truck.y=H-72;truck.x=Math.min(truck.x,W-truck.w-6)}
addEventListener("resize",resize);resize();
function rand(a,b){return Math.random()*(b-a)+a}
function hud(){phaseEl.textContent=phase==="drive"?"出動":phase==="fire"?"消火":phase==="rescue"?"救助":"完了";scoreEl.textContent=score;lifeEl.textContent=life;fireCountEl.textContent=fires.length}
function start(){running=true;phase="drive";score=0;life=3;distance=0;cars=[];fires=[];waters=[];victims=[];overlay.style.display="none";mission.textContent="サイレン走行中。車を避けて現場へ急行！";hud()}
document.getElementById("start").onclick=start;
function move(dx){if(!running)return;truck.x=Math.max(6,Math.min(W-truck.w-6,truck.x+dx))}
function action(){if(!running)return;if(phase==="drive"){score+=1;mission.textContent="安全確認しながら緊急走行！"}else if(phase==="fire"){waters.push({x:truck.x+truck.w/2,y:truck.y-10,r:7,vy:-9})}else if(phase==="rescue"){for(const v of victims){if(!v.saved&&Math.abs(v.x-truck.x)<60){v.saved=true;score+=25;mission.textContent="要救助者を救出！"}}if(victims.every(v=>v.saved))complete()}hud()}
["left","right","action"].forEach(id=>{let e=document.getElementById(id);e.onclick=()=>id==="left"?move(-36):id==="right"?move(36):action();e.addEventListener("touchstart",ev=>{ev.preventDefault();id==="left"?move(-36):id==="right"?move(36):action()})});
canvas.addEventListener("touchmove",e=>{if(!running)return;e.preventDefault();let r=canvas.getBoundingClientRect(),x=e.touches[0].clientX-r.left;truck.x=Math.max(6,Math.min(W-truck.w-6,x-truck.w/2))},{passive:false});
addEventListener("keydown",e=>{if(e.key==="ArrowLeft")move(-36);if(e.key==="ArrowRight")move(36);if(e.key===" "||e.key==="ArrowUp")action()});

function fireScene(){phase="fire";mission.textContent="現場到着。放水して火を消せ！";cars=[];waters=[];fires=[];for(let i=0;i<9;i++)fires.push({x:rand(35,W-35),y:rand(70,H*.56),hp:2,size:rand(30,44)});hud()}
function rescueScene(){phase="rescue";mission.textContent="火災鎮圧。要救助者の近くで救助ボタン！";victims=[{x:W*.25,y:H*.45,saved:false},{x:W*.72,y:H*.48,saved:false}];hud()}
function complete(){phase="complete";running=false;hud();mission.textContent="任務完了！";setTimeout(()=>{overlay.style.display="flex";document.querySelector(".panel h2").textContent="🏆 任務完了";document.querySelector(".panel p").textContent=`スコア ${score} 点。もう一度出動できます。`;document.querySelector(".panel button").textContent="再出動する"},500)}
function fail(){running=false;overlay.style.display="flex";document.querySelector(".panel h2").textContent="🚨 任務失敗";document.querySelector(".panel p").textContent=`体力がなくなりました。スコア ${score} 点。`;document.querySelector(".panel button").textContent="再出動する"}

function road(){ctx.fillStyle="#606060";ctx.fillRect(0,0,W,H);ctx.fillStyle="#3e3e3e";ctx.fillRect(W*.16,0,W*.68,H);ctx.strokeStyle="#fff";ctx.lineWidth=4;ctx.setLineDash([22,18]);ctx.beginPath();ctx.moveTo(W*.5,0);ctx.lineTo(W*.5,H);ctx.stroke();ctx.setLineDash([])}
function scene(){ctx.fillStyle="#9be0ff";ctx.fillRect(0,0,W,H*.58);ctx.fillStyle="#555";ctx.fillRect(0,H*.58,W,H*.42);ctx.fillStyle="#7b3f00";ctx.fillRect(W*.1,H*.17,W*.8,H*.3);ctx.fillStyle="#222";ctx.fillRect(W*.18,H*.24,W*.2,H*.12);ctx.fillRect(W*.62,H*.24,W*.2,H*.12);ctx.fillRect(W*.43,H*.34,W*.14,H*.13)}
function drawTruck(){ctx.fillStyle=tick%24<12?"#ff1744":"#1e88e5";ctx.fillRect(truck.x+22,truck.y-8,18,8);ctx.fillStyle="#d50000";ctx.fillRect(truck.x,truck.y,truck.w,truck.h);ctx.fillStyle="#fff";ctx.fillRect(truck.x+8,truck.y+9,18,13);ctx.fillRect(truck.x+36,truck.y+9,16,13);ctx.fillStyle="#111";ctx.beginPath();ctx.arc(truck.x+15,truck.y+45,8,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(truck.x+49,truck.y+45,8,0,Math.PI*2);ctx.fill();ctx.font="24px serif";ctx.fillText("🚒",truck.x+14,truck.y+33)}
function loop(){tick++;if(phase==="drive"){road();if(running){distance+=1.3;if(Math.random()<.025)cars.push({x:rand(22,W-55),y:-60,s:rand(2.5,4.4)});if(distance>760)fireScene()}for(let i=cars.length-1;i>=0;i--){let c=cars[i];c.y+=c.s;ctx.font="34px serif";ctx.fillText("🚗",c.x,c.y);if(c.y>H+50)cars.splice(i,1);if(Math.abs(c.x+18-(truck.x+31))<38&&Math.abs(c.y-truck.y)<42){cars.splice(i,1);life--;mission.textContent="接触！安全運転で急行せよ。";if(life<=0)fail();hud()}}ctx.fillStyle="#fff";ctx.font="16px sans-serif";ctx.fillText("現場まで "+Math.max(0,Math.floor((760-distance)/10))+"m",16,28)}else{scene();if(phase==="fire"){for(let i=waters.length-1;i>=0;i--){let w=waters[i];w.y+=w.vy;ctx.fillStyle="#03a9f4";ctx.beginPath();ctx.arc(w.x,w.y,w.r,0,Math.PI*2);ctx.fill();if(w.y<-15)waters.splice(i,1)}for(let i=fires.length-1;i>=0;i--){let f=fires[i];ctx.font=f.size+"px serif";ctx.fillText("🔥",f.x-f.size/2,f.y);ctx.fillStyle="rgba(0,0,0,.22)";ctx.beginPath();ctx.arc(f.x,f.y-28,f.size*.55,0,Math.PI*2);ctx.fill();for(let j=waters.length-1;j>=0;j--){let w=waters[j],dx=f.x-w.x,dy=f.y-w.y;if(Math.sqrt(dx*dx+dy*dy)<f.size){waters.splice(j,1);f.hp--;score+=5;if(f.hp<=0)fires.splice(i,1);hud();break}}}if(fires.length===0&&running)rescueScene()}if(phase==="rescue"){ctx.font="32px serif";for(const v of victims){if(!v.saved)ctx.fillText("🧍",v.x,v.y);else{ctx.fillStyle="#fff";ctx.font="14px sans-serif";ctx.fillText("救助済",v.x-10,v.y)}}}}drawTruck();requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
